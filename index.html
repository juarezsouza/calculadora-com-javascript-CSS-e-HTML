<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="style.css"/>
   <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" 
   rel="stylesheet"/>
  <title>Calculadora</title>
</head>
<body>
  <div class="calculadora">
    <div class="visor">
      <p id="expressao"></p>
      <p id="resultado">0</p>
    </div>

    <div class="botoes">
      <button onclick="limpar()">AC</button>
      <button onclick="inverterSinal()">+/-</button>
      <button onclick="porcentagem()">%</button>
      <button onclick="operador('/')">÷</button>

      <button onclick="digito('7')">7</button>
      <button onclick="digito('8')">8</button>
      <button onclick="digito('9')">9</button>
      <button onclick="operador('*')">×</button>

      <button onclick="digito('4')">4</button>
      <button onclick="digito('5')">5</button>
      <button onclick="digito('6')">6</button>
      <button onclick="operador('-')">−</button>

      <button onclick="digito('1')">1</button>
      <button onclick="digito('2')">2</button>
      <button onclick="digito('3')">3</button>
      <button onclick="operador('+')">+</button>

      <button class="zero" onclick="digito('0')">0</button>
      <button onclick="ponto()">.</button>
      <button class="igual" onclick="calcular()">=</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
